<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=/softs/">
  <title>{{ .Site.Title }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 60px 20px; }
    .container { width: 100%; max-width: 600px; text-align: center; }
    h1 { text-align: center; margin-bottom: 10px; color: #333; }
    p { color: #666; font-size: 14px; margin-bottom: 20px; }
    a { display: inline-block; padding: 8px 20px; background: #1677ff; color: #fff; text-decoration: none; border-radius: 4px; font-size: 14px; }
    a:hover { background: #4096ff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>{{ .Site.Title }}</h1>
    <p>正在跳转到软件下载页面...</p>
    <a href="/softs/">如果没有自动跳转，请点击这里</a>
  </div>
  <script>
    document.querySelectorAll('a').forEach(function(a) {
      a.setAttribute('target', '_blank');
      a.setAttribute('rel', 'noopener noreferrer');
    });
  </script>
</body>
</html>
